<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <script>
    const EXTENSION_ID = 'dgmakhnmibfdnkhopleclbfmfncdmfhf';
    const hash = window.location.hash || window.location.search;
    if (hash) {
      window.location.replace('chrome-extension://' + EXTENSION_ID + '/oauth.html' + (hash.startsWith('#') ? hash : '#' + hash.substring(1)));
    } else {
      document.body.innerHTML = '<p>No auth data. Close this tab.</p>';
    }
  </script>
</head>
